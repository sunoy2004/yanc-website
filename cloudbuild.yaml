# GCP Cloud Build: build Docker image, push to Artifact Registry, deploy to Cloud Run.
# Trigger this from a Cloud Build trigger connected to your Git (e.g. GitHub) repo for continuous deploy.
#
# Required trigger substitutions (set in Cloud Build trigger or use defaults):
#   _LOCATION    - GCP region (e.g asia-south1). Default: asia-south1
#   _SERVICE_NAME - Cloud Run service name. Default: yanc-website
# GitHub-connected triggers auto-inject: PROJECT_ID, COMMIT_SHA, SHORT_SHA, REPO_NAME, BRANCH_NAME
# One-time setup: create Artifact Registry repo in the same region, e.g.:
#   gcloud artifacts repositories create cloud-run-source-deploy --repository-format=docker --location=asia-south1

steps:

  # Ensure Artifact Registry repository exists (safe to run every time)
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk:slim'
    entrypoint: bash
    args:
      - '-c'
      - |
        gcloud artifacts repositories describe ${_REPO_NAME} --location=${_LOCATION} --project=${PROJECT_ID} 2>/dev/null || \
        gcloud artifacts repositories create ${_REPO_NAME} --repository-format=docker --location=${_LOCATION} --project=${PROJECT_ID}
    id: ensure-repo

  # Build the Docker image (uses Dockerfile in repo root) with layer caching and CMS URL build arg
  - name: 'gcr.io/cloud-builders/docker'
    waitFor: ['ensure-repo']
    args:
      - 'build'
      - '-t'
      - '${_LOCATION}-docker.pkg.dev/${PROJECT_ID}/${_REPO_NAME}/${_SERVICE_NAME}:${SHORT_SHA}'
      - '-t'
      - '${_LOCATION}-docker.pkg.dev/${PROJECT_ID}/${_REPO_NAME}/${_SERVICE_NAME}:latest'
      - '--build-arg'
      - 'CMS_BASE_URL=${_CMS_URL}'
      - '--cache-from'
      - '${_LOCATION}-docker.pkg.dev/${PROJECT_ID}/${_REPO_NAME}/${_SERVICE_NAME}:latest'
      - '.'

  # Push to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - '${_LOCATION}-docker.pkg.dev/${PROJECT_ID}/${_REPO_NAME}/${_SERVICE_NAME}:${SHORT_SHA}'

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - '${_LOCATION}-docker.pkg.dev/${PROJECT_ID}/${_REPO_NAME}/${_SERVICE_NAME}:latest'

  # Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk:slim'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - '${_SERVICE_NAME}'
      - '--image=${_LOCATION}-docker.pkg.dev/${PROJECT_ID}/${_REPO_NAME}/${_SERVICE_NAME}:${SHORT_SHA}'
      - '--region=${_LOCATION}'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--port=8080'
      - '--memory=512Mi'
      - '--cpu=1'
      - '--min-instances=0'
      - '--max-instances=3'
    env:
      - 'CLOUDSDK_CORE_PROJECT=${PROJECT_ID}'

options:
  logging: CLOUD_LOGGING_ONLY
  default_logs_bucket_behavior: REGIONAL_USER_OWNED_BUCKET

# Substitution variables (override in trigger or use defaults)
substitutions:
  _LOCATION: asia-south1
  _REPO_NAME: cloud-run-source-deploy
  _SERVICE_NAME: yanc-website
  _CMS_URL: https://yanc-cms-bk-1095720168864.asia-south1.run.app

timeout: 1200s
